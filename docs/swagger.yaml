      photos:
        description: List of photo objects
        items:
          $ref: '#/definitions/dtov2.PhotoRequest'
        type: array
      relationship_type:
        type: string
      status:
        description: onboarding, active
        type: string
    type: object
  dtov2.UploadURLResponse:
    properties:
