basePath: /api/v1
definitions:
  base.BaseResponse:
    properties:
      data: {}
      errors: {}
      message:
        example: Success
        type: string
      status:
        example: 200
        type: integer
    type: object
  dtov1.AcceptInviteRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  dtov1.AuthResponse:
    properties:
      refresh_token:
        example: abcdef123456...
        type: string
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        $ref: '#/definitions/dtov1.UserResponse'
    type: object
  dtov1.CheckEmailRequest:
    properties:
      email:
        example: user@example.com
        type: string
    required:
    - email
    type: object
  dtov1.CheckEmailResponse:
    properties:
      exists:
        example: true
        type: boolean
    type: object
  dtov1.ConsumableItemResponse:
    properties:
      amount:
        type: integer
      item_type:
        type: string
    type: object
  dtov1.ConversationResponse:
    properties:
      avatar_url:
        type: string
      avatar_urls:
        items:
          type: string
        type: array
      created_at:
        type: string
      entity:
        $ref: '#/definitions/dtov1.EntityResponse'
      id:
        type: string
      is_typing:
        type: boolean
      last_message:
        $ref: '#/definitions/dtov1.MessageResponse'
      swiper_entity_id:
        type: string
      title:
        type: string
      type:
        description: '"direct" or "group"'
        type: string
      unread_count:
        type: integer
    type: object
  dtov1.CreateGroupRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dtov1.DeviceRequest:
    properties:
      app_version:
        type: string
      device_id:
        type: string
      device_model:
        type: string
      device_name:
        type: string
      fcm_token:
        type: string
      os_version:
        type: string
    required:
    - device_id
    type: object
  dtov1.EntityResponse:
    properties:
      group:
        $ref: '#/definitions/dtov1.GroupResponse'
      id:
        type: string
      type:
        type: string
      user:
        $ref: '#/definitions/dtov1.UserResponse'
    type: object
  dtov1.GoogleLoginRequest:
    properties:
      bio:
        type: string
      date_of_birth:
        type: string
      device:
        $ref: '#/definitions/dtov1.DeviceRequest'
      email:
        example: user@example.com
        type: string
      full_name:
        example: John Doe
        type: string
      gender:
        type: string
      google_id:
        example: "123456789"
        type: string
      height_cm:
        type: integer
      id:
        type: string
      interested_in:
        type: string
      interests:
        items:
          type: string
        type: array
      languages:
        items:
          type: string
        type: array
      latitude:
        type: number
      location_city:
        type: string
      location_country:
        type: string
      longitude:
        type: number
      looking_for:
        type: string
      photos:
        items:
          $ref: '#/definitions/dtov1.PhotoRequest'
        type: array
      profile_picture:
        example: https://example.com/photo.jpg
        type: string
    required:
    - email
    - google_id
    type: object
  dtov1.GroupResponse:
    properties:
      created_by:
        type: string
      entity_id:
        type: string
      id:
        type: string
      main_photos:
        items:
          type: string
        type: array
      members:
        items:
          $ref: '#/definitions/dtov1.UserResponse'
        type: array
      name:
        type: string
    type: object
  dtov1.IncomingLikeResponse:
    properties:
      entity:
        $ref: '#/definitions/dtov1.EntityResponse'
      is_boosted:
        type: boolean
      is_crush:
        type: boolean
      swipe_time:
        type: string
      target_entity_id:
        type: string
    type: object
  dtov1.InviteToGroupRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  dtov1.LikesSummaryResponse:
    properties:
      count:
        type: integer
      last_photo:
        type: string
    type: object
  dtov1.LoginEmailRequest:
    properties:
      device:
        $ref: '#/definitions/dtov1.DeviceRequest'
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
    required:
    - email
    - password
    type: object
  dtov1.LogoutRequest:
    properties:
      device_id:
        type: string
    required:
    - device_id
    type: object
  dtov1.MasterItemResponse:
    properties:
      icon:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  dtov1.MatchResponse:
    properties:
      is_match:
        type: boolean
      match_id:
        type: string
      matched_entity:
        $ref: '#/definitions/dtov1.EntityResponse'
    type: object
  dtov1.MessageResponse:
    properties:
      content:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_read:
        type: boolean
      metadata:
        $ref: '#/definitions/entities.MessageMetadata'
      sender_id:
        type: string
      sender_name:
        type: string
      sender_photo_url:
        type: string
      type:
        $ref: '#/definitions/entities.MessageType'
    type: object
  dtov1.PhotoRequest:
    properties:
      _destroy:
        type: boolean
      id:
        type: string
      is_main:
        type: boolean
      url:
        type: string
    required:
    - url
    type: object
  dtov1.PhotoResponse:
    properties:
      id:
        type: string
      is_main:
        type: boolean
      url:
        type: string
    type: object
  dtov1.RefreshTokenRequest:
    properties:
      device_id:
        type: string
      refresh_token:
        type: string
    required:
    - device_id
    - refresh_token
    type: object
  dtov1.RegisterEmailRequest:
    properties:
      bio:
        type: string
      date_of_birth:
        example: "1995-01-01"
        type: string
      device:
        $ref: '#/definitions/dtov1.DeviceRequest'
      email:
        example: user@example.com
        type: string
      full_name:
        example: John Doe
        type: string
      gender:
        type: string
      height_cm:
        type: integer
      id:
        type: string
      interested_in:
        type: string
      interests:
        items:
          type: string
        type: array
      languages:
        items:
          type: string
        type: array
      latitude:
        type: number
      location_city:
        type: string
      location_country:
        type: string
      longitude:
        type: number
      looking_for:
        type: string
      password:
        example: password123
        minLength: 8
        type: string
      photos:
        items:
          $ref: '#/definitions/dtov1.PhotoRequest'
        type: array
    required:
    - date_of_birth
    - email
    - full_name
    - password
    type: object
  dtov1.SentLikeResponse:
    properties:
      created_at:
        type: string
      entity:
        $ref: '#/definitions/dtov1.EntityResponse'
      expires_at:
        type: string
      is_boosted:
        type: boolean
      is_crush:
        type: boolean
      swiper_entity_id:
        type: string
    type: object
  dtov1.SwipeRequest:
    properties:
      direction:
        enum:
        - LIKE
        - DISLIKE
        - CRUSH
        type: string
      swiped_entity_id:
        type: string
      swiper_entity_id:
        type: string
    required:
    - direction
    - swiped_entity_id
    - swiper_entity_id
    type: object
  dtov1.TokenResponse:
    properties:
      refresh_token:
        example: abcdef123456...
        type: string
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  dtov1.UpdateProfileRequest:
    properties:
      bio:
        type: string
      date_of_birth:
        description: YYYY-MM-DD
        type: string
      full_name:
        type: string
      gender:
        type: string
      height_cm:
        type: integer
      interested_in:
        type: string
      interests:
        items:
          type: string
        type: array
      languages:
        items:
          type: string
        type: array
      latitude:
        type: number
      location_city:
        type: string
      location_country:
        type: string
      longitude:
        type: number
      photos:
        description: List of photo objects
        items:
          $ref: '#/definitions/dtov1.PhotoRequest'
        type: array
      relationship_type:
        type: string
      status:
        description: onboarding, active
        type: string
    type: object
  dtov1.UploadURLResponse:
    properties:
      file_key:
        type: string
      upload_url:
        type: string
    type: object
  dtov1.UserResponse:
    properties:
      age:
        type: integer
      bio:
        type: string
      consumables:
        items:
          $ref: '#/definitions/dtov1.ConsumableItemResponse'
        type: array
      created_at:
        type: string
      date_of_birth:
        type: string
      email:
        type: string
      entity_id:
        type: string
      full_name:
        type: string
      gender:
        $ref: '#/definitions/dtov1.MasterItemResponse'
      height_cm:
        type: integer
      id:
        type: string
      interested_genders:
