host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a high-performance dating app backend server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Dating App API
  version: "1.0"
paths:
  /admin/configs:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/base.BaseResponse'
      security:
      - Bearer: []
      summary: Get all configs
      tags:
      - admin
  /admin/configs/reload:
    post:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Reload settings from database to RAM
      tags:
      - admin
  /admin/configs/reset:
    post:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: WIPE and Reset all configs to code defaults
      tags:
      - admin
  /admin/consumables/boost:
    post:
      consumes:
      - application/json
      parameters:
      - description: Boost Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.AdminConsumableRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/base.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dtov1.UserResponse'
              type: object
      security:
      - Bearer: []
      summary: Simulate adding a boost package to user
      tags:
      - admin
  /admin/consumables/crush:
    post:
      consumes:
      - application/json
      parameters:
      - description: Crush Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.AdminConsumableRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/base.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dtov1.UserResponse'
              type: object
      security:
      - Bearer: []
      summary: Simulate adding a crush package to user
      tags:
      - admin
  /admin/subscribe:
    post:
      consumes:
      - application/json
      parameters:
      - description: Subscribe Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.AdminSubscribeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/base.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dtov1.UserResponse'
              type: object
      security:
      - Bearer: []
      summary: Simulate user subscription to a plan
      tags:
      - admin
  /advertisements:
    get:
      consumes:
      - application/json
      description: Returns a list of active ads filtered by placement.
      parameters:
      - description: Placement filter (carousel, popup_modal, etc)
        in: query
        name: placement
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/base.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/v1.AdResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/base.BaseResponse'
      summary: Get active advertisements
      tags:
      - advertisements
  /auth/check-email:
    post:
      consumes:
      - application/json
      description: Checks if the provided email is already registered in the system.
      parameters:
      - description: Email to check
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtov1.CheckEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/base.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dtov1.CheckEmailResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/base.BaseResponse'
      summary: Check if email exists
      tags:
      - auth
  /auth/google:
    post:
      consumes:
      - application/json
      description: Handles Google OAuth authentication, including automatic account
        linking if the email already exists.
      parameters:
      - description: Google OAuth data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtov1.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/base.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dtov1.AuthResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/base.BaseResponse'
      summary: Google OAuth Login/Register
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password and returns a JWT
        token.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtov1.LoginEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/base.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dtov1.AuthResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/base.BaseResponse'
      summary: Login via Email
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes tokens and deactivates the associated device for the currently
        authenticated user.
      parameters:
      - description: Device data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtov1.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/base.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/base.BaseResponse'
      security:
      - BearerAuth: []
