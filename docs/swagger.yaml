          $ref: '#/definitions/dtov1.MasterItemResponse'
        type: array
      interests:
        items:
          $ref: '#/definitions/dtov1.MasterItemResponse'
        type: array
      languages:
        items:
          $ref: '#/definitions/dtov1.MasterItemResponse'
        type: array
      latitude:
        type: number
      location_city:
        type: string
      location_country:
        type: string
      longitude:
        type: number
      main_photo:
        type: string
      photos:
        items:
          $ref: '#/definitions/dtov1.PhotoResponse'
        type: array
      relationship_type:
        $ref: '#/definitions/dtov1.MasterItemResponse'
      relationshipType:
        $ref: '#/definitions/dtov1.MasterItemResponse'
      status:
        $ref: '#/definitions/entities.UserStatus'
      subscription:
        $ref: '#/definitions/dtov1.UserSubscriptionResponse'
      updated_at:
