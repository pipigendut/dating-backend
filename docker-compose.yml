version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: dating_db
    environment:
      POSTGRES_DB: dating_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  app:
    build: .
    container_name: dating_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=dating_app
      - ONNXRUNTIME_SHARED_LIBRARY_PATH=/app/lib/libonnxruntime.so
    env_file:
      - .env
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
